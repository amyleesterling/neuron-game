<script>
// ── $SNAKE hover animation ──
(function() {
  var sc = document.getElementById('snakeCanvas');
  var sx = sc.getContext('2d');
  var badge = document.getElementById('snakeBadge');
  var anim = null;
  var snakeTrail = [];
  var t = 0;
  var duration = 1.1; // seconds for full flight
  var segLen = 6;
  var segs = 28;
  var alive = false;

  function resize() {
    sc.width = window.innerWidth;
    sc.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // Exponential curve from badge right edge to top-right corner
  function curvePoint(p) {
    var br = badge.getBoundingClientRect();
    var startX = br.right + 4;
    var startY = br.top + br.height / 2;
    var endX = sc.width - 20;
    var endY = -30;
    // Exponential ease: x linear, y exponential rise
    var x = startX + (endX - startX) * p;
    // Exponential curve upward
    var exp = Math.pow(p, 2.2);
    var y = startY + (endY - startY) * exp;
    // Add sinusoidal slither perpendicular to path
    var dx = endX - startX;
    var dy = (endY - startY) * 2.2 * Math.pow(Math.max(p, 0.01), 1.2);
    var len = Math.sqrt(dx * dx + dy * dy) || 1;
    var nx = -dy / len;
    var ny = dx / len;
    var slither = Math.sin(p * 18 + t * 6) * (7 - 4 * p);
    return { x: x + nx * slither, y: y + ny * slither };
  }

  function drawSnake() {
    sx.clearRect(0, 0, sc.width, sc.height);
    if (snakeTrail.length < 2) return;

    // Body glow
    sx.save();
    sx.shadowColor = '#4caf50';
    sx.shadowBlur = 12;
    sx.strokeStyle = '#4caf50';
    sx.lineWidth = 3.5;
    sx.lineCap = 'round';
    sx.lineJoin = 'round';
    sx.beginPath();
    sx.moveTo(snakeTrail[0].x, snakeTrail[0].y);
    for (var i = 1; i < snakeTrail.length; i++) {
      sx.lineTo(snakeTrail[i].x, snakeTrail[i].y);
    }
    sx.stroke();
    sx.restore();

    // Brighter core
    sx.strokeStyle = '#66bb6a';
    sx.lineWidth = 1.8;
    sx.lineCap = 'round';
    sx.lineJoin = 'round';
    sx.beginPath();
    sx.moveTo(snakeTrail[0].x, snakeTrail[0].y);
    for (var j = 1; j < snakeTrail.length; j++) {
      sx.lineTo(snakeTrail[j].x, snakeTrail[j].y);
    }
    sx.stroke();

    // Head - bright dot
    var head = snakeTrail[snakeTrail.length - 1];
    sx.beginPath();
    sx.arc(head.x, head.y, 3.5, 0, Math.PI * 2);
    sx.fillStyle = '#ffe566';
    sx.shadowColor = '#ffe566';
    sx.shadowBlur = 10;
    sx.fill();
    sx.shadowBlur = 0;

    // Eyes
    var prev = snakeTrail[snakeTrail.length - 2];
    var ang = Math.atan2(head.y - prev.y, head.x - prev.x);
    var ex1 = head.x + Math.cos(ang + 0.6) * 3;
    var ey1 = head.y + Math.sin(ang + 0.6) * 3;
    var ex2 = head.x + Math.cos(ang - 0.6) * 3;
    var ey2 = head.y + Math.sin(ang - 0.6) * 3;
    sx.fillStyle = '#ff4466';
    sx.beginPath();
    sx.arc(ex1, ey1, 1.2, 0, Math.PI * 2);
    sx.fill();
    sx.beginPath();
    sx.arc(ex2, ey2, 1.2, 0, Math.PI * 2);
    sx.fill();
  }

  function tick() {
    if (!alive) return;
    t += 0.018;
    var raw = t / duration;
    var tailLen = 0.18;
    var headP = Math.min(raw, 1.0);
    var tailP = Math.max(raw - tailLen, 0);

    snakeTrail = [];
    var lo = Math.min(tailP, 1.0);
    var hi = Math.min(headP, 1.0);
    if (hi > lo) {
      var steps = Math.max(Math.floor((hi - lo) * 200), 2);
      for (var i = 0; i <= steps; i++) {
        var p = lo + (hi - lo) * (i / steps);
        snakeTrail.push(curvePoint(p));
      }
    }
    drawSnake();

    if (tailP >= 1.0) {
      sx.clearRect(0, 0, sc.width, sc.height);
      alive = false;
      return;
    }
    anim = requestAnimationFrame(tick);
  }

  badge.addEventListener('mouseenter', function() {
    if (alive) return;
    alive = true;
    t = 0;
    snakeTrail = [];
    resize();
    tick();
  });
})();
</script>

  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var overlay = document.getElementById('overlay');
  var olTitle = document.getElementById('olTitle');
  var olBody = document.getElementById('olBody');
  var mainBtn = document.getElementById('mainBtn');
  var valScore = document.getElementById('valScore');
  var valBranch = document.getElementById('valBranch');
  var valLives = document.getElementById('valLives');

  var CW, CH, CELL, COLS, ROWS;

  function resize() {
    CW = window.innerWidth;
    CH = window.innerHeight;
    canvas.width = CW;
    canvas.height = CH;
    CELL = Math.floor(Math.min(CW, CH) / 48);
    if (CELL < 5) CELL = 5;
    COLS = Math.floor(CW / CELL);
    ROWS = Math.floor(CH / CELL);
  }
  resize();

  // Background ambient dendrites for lobby/death screens
  var bgDendrites = [];
  var bgTimer = 0;

  function spawnBgDendrite(fromCenter) {
    var sx, sy, dx, dy;
    if (fromCenter) {
      // Spawn from screen center
      sx = CW / 2; sy = CH / 2;
      var a = Math.random() * Math.PI * 2;
      dx = Math.cos(a); dy = Math.sin(a);
    } else {
      // Spawn from edges or random positions (for death burst)
      var side = Math.floor(Math.random() * 5);
      if (side === 0) { sx = Math.random() * CW; sy = 0; dx = (Math.random() - 0.5) * 2; dy = 1; }
      else if (side === 1) { sx = Math.random() * CW; sy = CH; dx = (Math.random() - 0.5) * 2; dy = -1; }
      else if (side === 2) { sx = 0; sy = Math.random() * CH; dx = 1; dy = (Math.random() - 0.5) * 2; }
      else if (side === 3) { sx = CW; sy = Math.random() * CH; dx = -1; dy = (Math.random() - 0.5) * 2; }
      else { sx = CW * 0.3 + Math.random() * CW * 0.4; sy = CH * 0.3 + Math.random() * CH * 0.4; var a2 = Math.random() * Math.PI * 2; dx = Math.cos(a2); dy = Math.sin(a2); }
    }
    var len = Math.sqrt(dx * dx + dy * dy);
    dx /= len; dy /= len;
    var spd = 1.5 + Math.random() * 2.5;
    var hue = Math.random() < 0.7 ? '79,195,247' : '255,107,157';
    bgDendrites.push({
      pts: [{x: sx, y: sy}],
      dx: dx, dy: dy,
      spd: spd,
      alpha: 0.25 + Math.random() * 0.35,
      fade: 0.0003 + Math.random() * 0.0004,
      col: hue,
      turnTimer: 20 + Math.floor(Math.random() * 40),
      turnCount: 0,
      maxTurns: 3 + Math.floor(Math.random() * 5),
      lineW: 1 + Math.random() * 1.5,
      alive: true
    });
  }

  function tickBgDendrites(mode) {
    var i, d, head, nx, ny;
    bgTimer++;
    if (mode === 'menu') {
      // One dendrite at a time from center
      var anyAlive = false;
      for (i = 0; i < bgDendrites.length; i++) { if (bgDendrites[i].alive) { anyAlive = true; break; } }
      if (!anyAlive) {
        bgDendrites = [];
        spawnBgDendrite(true);
      }
    } else {
      // Death burst: lots of dendrites
      if (bgTimer % 12 === 0 && bgDendrites.length < 30) {
        spawnBgDendrite(false);
      }
    }
    for (i = bgDendrites.length - 1; i >= 0; i--) {
      d = bgDendrites[i];
      if (!d.alive) { bgDendrites.splice(i, 1); continue; }
      d.alpha -= d.fade;
      if (d.alpha <= 0) { d.alive = false; continue; }
      head = d.pts[d.pts.length - 1];
      nx = head.x + d.dx * d.spd;
      ny = head.y + d.dy * d.spd;
      // Random turns
      d.turnTimer--;
      if (d.turnTimer <= 0 && d.turnCount < d.maxTurns) {
        var ang = (Math.random() - 0.5) * Math.PI * 0.7;
        var cdx = d.dx * Math.cos(ang) - d.dy * Math.sin(ang);
        var cdy = d.dx * Math.sin(ang) + d.dy * Math.cos(ang);
        d.dx = cdx; d.dy = cdy;
        d.turnTimer = 15 + Math.floor(Math.random() * 35);
        d.turnCount++;
        // Chance to fork — only in death mode, or rarely in menu
        var forkChance = (mode === 'menu') ? 0.15 : 0.35;
        var maxBg = (mode === 'menu') ? 4 : 30;
        if (Math.random() < forkChance && bgDendrites.length < maxBg) {
          var fAng = -ang * 0.8 + (Math.random() - 0.5) * 0.3;
          var fdx = d.dx * Math.cos(fAng) - d.dy * Math.sin(fAng);
          var fdy = d.dx * Math.sin(fAng) + d.dy * Math.cos(fAng);
          bgDendrites.push({
            pts: [{x: nx, y: ny}],
            dx: fdx, dy: fdy,
            spd: d.spd * (0.7 + Math.random() * 0.3),
            alpha: d.alpha * 0.85,
            fade: d.fade * 1.1,
            col: d.col,
            turnTimer: 20 + Math.floor(Math.random() * 30),
            turnCount: 0,
            maxTurns: 1 + Math.floor(Math.random() * 2),
            lineW: d.lineW * 0.7,
            alive: true
          });
        }
      }
      d.pts.push({x: nx, y: ny});
      // Kill if off screen
      if (nx < -50 || nx > CW + 50 || ny < -50 || ny > CH + 50) d.alive = false;
      // Cap path length for performance
      if (d.pts.length > 300) d.pts.shift();
    }
  }

  function drawBgDendrites() {
    var i, d, j;
    for (i = 0; i < bgDendrites.length; i++) {
      d = bgDendrites[i];
      if (d.pts.length < 2 || !d.alive) continue;
      ctx.save();
      ctx.strokeStyle = 'rgba(' + d.col + ',' + d.alpha + ')';
      ctx.lineWidth = d.lineW;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.shadowColor = 'rgba(' + d.col + ',' + (d.alpha * 0.6) + ')';
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(d.pts[0].x, d.pts[0].y);
      for (j = 1; j < d.pts.length; j++) {
        ctx.lineTo(d.pts[j].x, d.pts[j].y);
      }
      ctx.stroke();
      // Bright tip
      var tip = d.pts[d.pts.length - 1];
      ctx.beginPath();
      ctx.arc(tip.x, tip.y, d.lineW + 1, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + d.col + ',' + Math.min(d.alpha * 2.5, 0.8) + ')';
      ctx.fill();
      ctx.restore();
    }
  }

  // Game variables — all plain, no shorthand methods
  var gState = 'menu';
  var score = 0;
  var branches = [];
  var activeIdx = 0;
  var dots = [];
  var axonPts = [];
  var signals = [];
  var occupied = {};
  var somaGX = 0;
  var somaGY = 0;
  var origins = [];  // [{x,y,dx,dy,name}]
  var pendDX = 0;
  var pendDY = 0;
  var hasPend = false;
  var gameSpd = 135;
  var accum = 0;
  var isDead = false;
  var lives = 2;
  var isHurt = false;
  var hurtTimer = 0;
  var lastTS = 0;
  var particles = [];
  var frozenBranches = [];
  var frozenDots = [];
  var particlesActive = false;
  var isDemo = true;
  var demoAccum = 0;
  var adLifeUsed = false;
  var stripeLivesUsed = false;
  // Stripe Payment Links — replace with your links from Stripe Dashboard
  // Tier 1: "NEURON - 3 Extra Lives" at $0.99 → redirect to https://neuronsnake.com?stripe=success
  // Tier 2: "NEURON - 20 Extra Lives" at $4.99 → redirect to https://neuronsnake.com?stripe=success
  var STRIPE_LINK_T1 = 'https://buy.stripe.com/REPLACE_WITH_T1_LINK';
  var STRIPE_LINK_T2 = 'https://buy.stripe.com/REPLACE_WITH_T2_LINK';
  var stripeHasPurchasedBefore = !!localStorage.getItem('neuron_stripe_bought');
  var stripeTier = stripeHasPurchasedBefore ? 2 : 1;

  function cellKey(x, y) { return x + '_' + y; }
  function worldX(gx) { return gx * CELL + CELL / 2; }
  function worldY(gy) { return gy * CELL + CELL / 2; }

  function initGame() {
    score = 0;
    branches = [];
    activeIdx = 0;
    dots = [];
    axonPts = [];
    signals = [];
    occupied = {};
    isDead = false;
    lives = 2;
    isHurt = false;
    hurtTimer = 0;
    pendDX = 0; pendDY = 0; hasPend = false;
    gameSpd = 65; accum = 0;
    particles = []; frozenBranches = []; frozenDots = [];
    particlesActive = false;
    adLifeUsed = false;
    stripeLivesUsed = false;

    somaGX = Math.floor(COLS / 2);
    somaGY = Math.floor(ROWS / 2);

    // Block soma area (but NOT the center itself — branches start there)
    var dy, dx;
    for (dy = -4; dy <= 4; dy++) {
      for (dx = -4; dx <= 4; dx++) {
        if (dx === 0 && dy === 0) continue; // center stays open for branch origins
        if (dx*dx + dy*dy <= 20) {
          occupied[cellKey(somaGX+dx, somaGY+dy)] = true;
        }
      }
    }

    // Define 3 branch origins at the 3 pointy corners of pyramidal soma
    // Soma shape: apex at ~2 cells up, bottom corners at ~(±2, +2)
    origins = [
      {x: somaGX,   y: somaGY-2, dx: 0,  dy: -1, name: 'top'},
      {x: somaGX-2, y: somaGY+2, dx: -1, dy: 0,  name: 'left'},
      {x: somaGX+2, y: somaGY+2, dx: 1,  dy: 0,  name: 'right'}
    ];

    // Axon exits from base of pyramid
    var i;
    for (i = 1; i <= 12; i++) {
      axonPts.push({x: somaGX, y: somaGY + 4 + i});
      occupied[cellKey(somaGX, somaGY + 4 + i)] = true;
    }

    spawnBranch();
    branches[0].growing = true;

    for (i = 0; i < 5; i++) { spawnDot(); }
    refreshHUD();
  }

  function spawnBranch() {
    var pick = origins[Math.floor(Math.random() * origins.length)];
    var p0 = {x: pick.x, y: pick.y};  // start at orange origin dot
    var p1 = {x: pick.x + pick.dx, y: pick.y + pick.dy};  // one step outward
    if (!occupied[cellKey(p0.x, p0.y)]) occupied[cellKey(p0.x, p0.y)] = true;
    if (!occupied[cellKey(p1.x, p1.y)]) occupied[cellKey(p1.x, p1.y)] = true;
    branches.push({
      path: [p0, p1],
      dirX: pick.dx,
      dirY: pick.dy,
      origName: pick.name,
      growing: false,
      onExistingPath: true
    });
    return true;
  }

  function spawnDot() {
    var attempts, x, y, dup, i;
    for (attempts = 0; attempts < 400; attempts++) {
      x = 2 + Math.floor(Math.random() * (COLS - 4));
      y = 2 + Math.floor(Math.random() * (ROWS - 4));
      if (occupied[cellKey(x, y)]) continue;
      if (Math.abs(x - somaGX) < 10 && Math.abs(y - somaGY) < 10) continue;
      dup = false;
      for (i = 0; i < dots.length; i++) {
        if (dots[i].x === x && dots[i].y === y) { dup = true; break; }
      }
      if (!dup) {
        dots.push({x: x, y: y, phase: Math.random() * Math.PI * 2});
        return;
      }
    }
  }

  // Input
  function handleTap(clientX, clientY) {
    if (gState !== 'playing' || isDead) return;
    var b = branches[activeIdx];
    if (!b || !b.growing) return;
    var head = b.path[b.path.length - 1];
    var hx = worldX(head.x);
    var hy = worldY(head.y);
    var ddx = clientX - hx;
    var ddy = clientY - hy;
    var ndx, ndy;
    if (Math.abs(ddx) >= Math.abs(ddy)) {
      ndx = ddx > 0 ? 1 : -1;
      ndy = 0;
      if (ndx === -b.dirX && b.dirX !== 0) { ndx = 0; ndy = ddy >= 0 ? 1 : -1; }
    } else {
      ndx = 0;
      ndy = ddy > 0 ? 1 : -1;
      if (ndy === -b.dirY && b.dirY !== 0) { ndx = ddx >= 0 ? 1 : -1; ndy = 0; }
    }
    pendDX = ndx; pendDY = ndy; hasPend = true;
  }

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    handleTap(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive: false});

  canvas.addEventListener('mousedown', function(e) {
    handleTap(e.clientX, e.clientY);
  });

  document.addEventListener('keydown', function(e) {
    // Don't intercept keys when typing in an input field
    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
    var ndx = 0, ndy = 0, matched = true;
    if (e.key === 'ArrowUp'    || e.key === 'w') { ndx=0; ndy=-1; }
    else if (e.key === 'ArrowDown'  || e.key === 's') { ndx=0; ndy=1; }
    else if (e.key === 'ArrowLeft'  || e.key === 'a') { ndx=-1; ndy=0; }
    else if (e.key === 'ArrowRight' || e.key === 'd') { ndx=1; ndy=0; }
    else matched = false;
    if (!matched) return;
    e.preventDefault();
    var b = branches[activeIdx];
    if (!b || !b.growing) return;
    if (ndx !== 0 && b.dirX !== 0) return;
    if (ndy !== 0 && b.dirY !== 0) return;
    pendDX = ndx; pendDY = ndy; hasPend = true;
  });

  // Returns true if (x,y) is on any branch OTHER than activeIdx, or is soma-blocked area
  function isOtherBranchCell(x, y) {
    var kk = cellKey(x, y);
    // Soma body cells (not center — center is safe start point)
    if (x === somaGX && y === somaGY) return false; // soma center always safe
    // Axon cells
    for (var ai = 0; ai < axonPts.length; ai++) {
      if (axonPts[ai].x === x && axonPts[ai].y === y) return true;
    }
    // Other branches
    for (var bi = 0; bi < branches.length; bi++) {
      if (bi === activeIdx) continue;
      var bp = branches[bi].path;
      for (var i = 0; i < bp.length; i++) {
        if (cellKey(bp[i].x, bp[i].y) === kk) return true;
      }
    }
    return false;
  }

  // Returns true if (x,y) is on the CURRENT branch's own path
  function isOwnPath(x, y) {
    var kk = cellKey(x, y);
    var b = branches[activeIdx];
    if (!b) return false;
    for (var i = 0; i < b.path.length; i++) {
      if (cellKey(b.path[i].x, b.path[i].y) === kk) return true;
    }
    return false;
  }

  // Returns true if (x,y) is on soma body, axon, or another branch's path
  // (i.e. it was occupied before the current branch grew through it)
  function isOnExistingPath(x, y) {
    // Soma center
    if (x === somaGX && y === somaGY) return true;
    // Soma body cells
    var ddx = x - somaGX, ddy = y - somaGY;
    if (ddx * ddx + ddy * ddy <= 20) return true;
    // Axon cells
    for (var ai = 0; ai < axonPts.length; ai++) {
      if (axonPts[ai].x === x && axonPts[ai].y === y) return true;
    }
    // Other branches
    for (var bi = 0; bi < branches.length; bi++) {
      if (bi === activeIdx) continue;
      var bp = branches[bi].path;
      for (var i = 0; i < bp.length; i++) {
        if (bp[i].x === x && bp[i].y === y) return true;
      }
    }
    return false;
  }

  function demoInit() {
    isDemo = true;
    bgDendrites = [];
    demoAccum = 0;
    initGame();
    lives = 30;
    gameSpd = 80;
  }

  function demoAI() {
    if (isDead || isHurt) return;
    var b = branches[activeIdx];
    if (!b || !b.growing) return;
    var head = b.path[b.path.length - 1];
    var nx = head.x + b.dirX;
    var ny = head.y + b.dirY;
    // Don't turn if dot is directly ahead
    var i, dotAhead = false;
    for (i = 0; i < dots.length; i++) {
      if (dots[i].x === nx && dots[i].y === ny) { dotAhead = true; break; }
    }
    if (dotAhead) return;
    // Find nearest dot
    var bestDot = null, bestDist = Infinity;
    for (i = 0; i < dots.length; i++) {
      var dist = Math.abs(dots[i].x - head.x) + Math.abs(dots[i].y - head.y);
      if (dist < bestDist) { bestDist = dist; bestDot = dots[i]; }
    }
    if (!bestDot) return;
    // Check if current direction is safe
    var currentSafe = nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS;
    if (currentSafe && occupied[cellKey(nx, ny)] && !(b.onExistingPath && isOnExistingPath(nx, ny))) currentSafe = false;
    // Decide whether to turn
    var shouldTurn = !currentSafe;
    if (!shouldTurn) {
      var ddx = bestDot.x - head.x, ddy = bestDot.y - head.y;
      if (b.dirX !== 0 && Math.abs(ddx) <= 1 && Math.abs(ddy) > 1) shouldTurn = true;
      else if (b.dirY !== 0 && Math.abs(ddy) <= 1 && Math.abs(ddx) > 1) shouldTurn = true;
      else if (Math.random() < 0.12) shouldTurn = true;
    }
    if (shouldTurn) {
      var options = [];
      if (b.dirX !== 0) { options.push({dx:0,dy:1}); options.push({dx:0,dy:-1}); }
      else { options.push({dx:1,dy:0}); options.push({dx:-1,dy:0}); }
      var best = null, bestS = -Infinity;
      for (i = 0; i < options.length; i++) {
        var tx = head.x + options[i].dx, ty = head.y + options[i].dy;
        var safe = tx >= 0 && tx < COLS && ty >= 0 && ty < ROWS;
        if (safe && occupied[cellKey(tx, ty)]) safe = false;
        var dd = Math.abs(bestDot.x - tx) + Math.abs(bestDot.y - ty);
        var sc = (safe ? 1000 : 0) - dd;
        if (sc > bestS) { bestS = sc; best = options[i]; }
      }
      if (best) { pendDX = best.dx; pendDY = best.dy; hasPend = true; }
    }
  }

  function step() {
    if (isDead || isHurt) return;
    var b = branches[activeIdx];
    if (!b || !b.growing) return;
    if (hasPend) { b.dirX = pendDX; b.dirY = pendDY; hasPend = false; }
    var head = b.path[b.path.length - 1];
    var nx = head.x + b.dirX;
    var ny = head.y + b.dirY;
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) { triggerDeath(); return; }
    var kk = cellKey(nx, ny);
    var i;

    // Check dot hit first
    for (i = 0; i < dots.length; i++) {
      if (dots[i].x === nx && dots[i].y === ny) {
        b.path.push({x: nx, y: ny});
        occupied[kk] = true;
        b.onExistingPath = false;
        dots.splice(i, 1);
        b.growing = false;
        score++;
        gameSpd = Math.max(30, gameSpd - 2);
        launchSignal(b);
        spawnDot();
        if (Math.random() < 0.25) spawnDot();
        flashScore();
        signals[signals.length - 1].onDone = nextBranch;
        refreshHUD();
        return;
      }
    }

    if (occupied[kk]) {
      // Soma/axon/other branch — allowed only while still near origin
      if (b.onExistingPath && isOnExistingPath(nx, ny)) {
        b.path.push({x: nx, y: ny});
        return;
      }
      // Push collision cell so intersection is visually shown
      b.path.push({x: nx, y: ny});
      triggerDeath();
      return;
    }

    // Fresh unoccupied cell — committed, no more free retracing
    b.onExistingPath = false;
    b.path.push({x: nx, y: ny});
    occupied[kk] = true;
  }

  function nextBranch() {
    try {
      spawnBranch();
      activeIdx = branches.length - 1;
      branches[activeIdx].growing = true;
      refreshHUD();
    } catch(e) {
      var box = document.getElementById('errBox');
      if (box) { box.style.display='block'; box.textContent='nextBranch ERR: '+e.message; }
    }
  }

  function launchSignal(b) {
    var path = [];
    var i;
    for (i = b.path.length - 1; i >= 0; i--) path.push(b.path[i]);
    // Bridge from branch origin through soma center to axon
    path.push({x: somaGX, y: somaGY});
    for (i = 0; i < axonPts.length; i++) path.push(axonPts[i]);
    signals.push({path: path, t: 0, spd: 0.035, onDone: null});
  }

  function buildParticles() {

      bp = branches[bi].path;
      for (pi = 0; pi < bp.length; pi++) {
        for (ci = 0; ci < 2; ci++) {

          spd2 = 0.4 + Math.random() * 2.8;
          particles.push({
            x: worldX(bp[pi].x), y: worldY(bp[pi].y),
            vx: Math.cos(ang) * spd2, vy: Math.sin(ang) * spd2,
            r: 1.5 + Math.random() * 2.5, a: 1,

            dec: 0.012 + Math.random() * 0.016,
            grav: 0.04 + Math.random() * 0.05
          });
        }
      }
    }
    var si, ang2, spd3;
    for (si = 0; si < 80; si++) {
      ang2 = Math.random() * Math.PI * 2;
      spd3 = 1 + Math.random() * 4;
      particles.push({
        x: worldX(somaGX), y: worldY(somaGY),
        vx: Math.cos(ang2) * spd3, vy: Math.sin(ang2) * spd3,
        r: 2 + Math.random() * 4, a: 1,

        dec: 0.007 + Math.random() * 0.013,
        grav: 0.03 + Math.random() * 0.05
      });
    }
  }

  function tickParticles() {
    var i, p;
    for (i = 0; i < particles.length; i++) {
      p = particles[i];
      if (p.a <= 0) continue;
      p.x += p.vx; p.y += p.vy;
      p.vy += p.grav;
      p.vx *= 0.98; p.vy *= 0.98;
      p.a -= p.dec;
    }
  }

  // === Neuron Fireworks (high score celebration) ===
  var fwCanvas, fwCtx, fwActive = false;
  var fwRockets = [], fwParts = [], fwSched = [];
  var fwStart = 0;

  function startNeuronFireworks() {
    fwCanvas = document.getElementById('fwCanvas');
    if (!fwCanvas) {
      fwCanvas = document.createElement('canvas');
      fwCanvas.id = 'fwCanvas';
      document.body.appendChild(fwCanvas);
    }
    fwCanvas.width = window.innerWidth;
    fwCanvas.height = window.innerHeight;
    fwCanvas.style.display = 'block';
    fwCtx = fwCanvas.getContext('2d');
    fwRockets = []; fwParts = []; fwActive = true;
    fwStart = performance.now();
    var cols = ['79,195,247', '255,107,157', '255,229,102', '180,130,255'];
    fwSched = [];
    for (var i = 0; i < 10; i++) {
      fwSched.push({ t: i * 400 + Math.random() * 200, x: fwCanvas.width * (0.12 + Math.random() * 0.76), col: cols[i % 4] });
    }
    requestAnimationFrame(fwLoop);
  }

  function fwLoop() {
    if (!fwActive) return;
    var elapsed = performance.now() - fwStart;
    // Launch scheduled rockets
    for (var si = fwSched.length - 1; si >= 0; si--) {
      if (elapsed >= fwSched[si].t) {
        fwRockets.push({
          x: fwSched[si].x, y: fwCanvas.height + 10,
          targetY: fwCanvas.height * (0.12 + Math.random() * 0.3),
          vy: -(fwCanvas.height * 0.013 + Math.random() * fwCanvas.height * 0.004),
          trail: [], col: fwSched[si].col
        });
        fwSched.splice(si, 1);
      }
    }
    // Update rockets
    for (var ri = fwRockets.length - 1; ri >= 0; ri--) {
      var r = fwRockets[ri];
      r.y += r.vy;
      r.trail.push({ x: r.x, y: r.y, a: 1 });
      for (var ti2 = r.trail.length - 1; ti2 >= 0; ti2--) {
        r.trail[ti2].a -= 0.07;
        if (r.trail[ti2].a <= 0) r.trail.splice(ti2, 1);
      }
      if (r.y <= r.targetY) { burstFwNeuron(r.x, r.y, r.col); fwRockets.splice(ri, 1); }
    }
    // Update particles
    var alive = false;
    for (var pi = 0; pi < fwParts.length; pi++) {
      var p = fwParts[pi];
      if (p.a <= 0) continue;
      alive = true;
      p.x += p.vx; p.y += p.vy;
      p.vy += p.grav;
      p.vx *= 0.985; p.vy *= 0.985;
      p.a -= p.dec;
    }
    if (!alive && fwRockets.length === 0 && fwSched.length === 0) {
      fwActive = false;
      fwCanvas.style.display = 'none';
      return;
    }
    // Draw
    fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
    // Rocket trails + heads
    for (ri = 0; ri < fwRockets.length; ri++) {
      r = fwRockets[ri];
      for (var ti = 0; ti < r.trail.length; ti++) {
        var t = r.trail[ti];
        fwCtx.beginPath(); fwCtx.arc(t.x, t.y, 2 * t.a, 0, Math.PI * 2);
        fwCtx.fillStyle = 'rgba(' + r.col + ',' + t.a + ')'; fwCtx.fill();
      }
      fwCtx.save();
      fwCtx.shadowColor = 'rgba(' + r.col + ',0.9)'; fwCtx.shadowBlur = 15;
      fwCtx.beginPath(); fwCtx.arc(r.x, r.y, 3, 0, Math.PI * 2);
      fwCtx.fillStyle = 'rgba(' + r.col + ',1)'; fwCtx.fill();
      fwCtx.restore();
    }
    // Burst particles
    for (pi = 0; pi < fwParts.length; pi++) {
      p = fwParts[pi];
      if (p.a <= 0) continue;
      fwCtx.save();
      fwCtx.shadowColor = 'rgba(' + p.col + ',0.7)';
      fwCtx.shadowBlur = p.bloom || 10;
      fwCtx.beginPath(); fwCtx.arc(p.x, p.y, Math.max(0.3, p.r * Math.min(1, p.a)), 0, Math.PI * 2);
      fwCtx.fillStyle = 'rgba(' + p.col + ',' + Math.min(1, p.a) + ')'; fwCtx.fill();
      fwCtx.restore();
    }
    requestAnimationFrame(fwLoop);
  }

  function burstFwNeuron(cx, cy, col) {
    var i, ang, spd, b, s;
    // Soma flash — bright expanding center
    for (i = 0; i < 22; i++) {
      ang = Math.random() * Math.PI * 2; spd = 0.3 + Math.random() * 2;
      fwParts.push({ x: cx, y: cy, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
        r: 3 + Math.random() * 4, a: 1.5, col: col, dec: 0.018, grav: 0.005, bloom: 20 });
    }
    // White core flash
    for (i = 0; i < 6; i++) {
      ang = Math.random() * Math.PI * 2; spd = 0.2 + Math.random() * 0.7;
      fwParts.push({ x: cx, y: cy, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
        r: 2 + Math.random() * 2, a: 2, col: '255,255,255', dec: 0.035, grav: 0.003, bloom: 25 });
    }
    // Dendrite branches — radiate outward with forks
    var nb = 5 + Math.floor(Math.random() * 4);
    for (b = 0; b < nb; b++) {
      var ba = (b / nb) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
      var bs = 2.5 + Math.random() * 3;
      // Main branch trail
      for (s = 0; s < 10; s++) {
        var sp2 = (Math.random() - 0.5) * 0.1;
        fwParts.push({
          x: cx + Math.cos(ba) * s * 0.5, y: cy + Math.sin(ba) * s * 0.5,
          vx: Math.cos(ba + sp2) * bs * (1 - s * 0.06),
          vy: Math.sin(ba + sp2) * bs * (1 - s * 0.06),
          r: 2.5 - s * 0.15, a: 1.2 - s * 0.03,
          col: col, dec: 0.01 + s * 0.002, grav: 0.012, bloom: 10 });
      }
      // Fork at branch tip
      if (Math.random() < 0.6) {
        for (var f = 0; f < 2; f++) {
          var fa = ba + (f === 0 ? -0.55 : 0.55);
          for (var fs = 0; fs < 5; fs++) {
            fwParts.push({
              x: cx + Math.cos(ba) * bs * 2.5, y: cy + Math.sin(ba) * bs * 2.5,
              vx: Math.cos(fa) * bs * 0.5, vy: Math.sin(fa) * bs * 0.5,
              r: 1.5 - fs * 0.15, a: 0.9,
              col: col, dec: 0.015, grav: 0.018, bloom: 8 });
          }
        }
      }
    }
    // Axon — pink, mostly downward
    var aa = Math.PI * 0.5 + (Math.random() - 0.5) * 0.3;
    for (s = 0; s < 12; s++) {
      fwParts.push({
        x: cx, y: cy,
        vx: Math.cos(aa) * (3 + Math.random()) * (1 - s * 0.04),
        vy: Math.sin(aa) * (3 + Math.random()) * (1 - s * 0.04),
        r: s % 2 === 0 ? 2 : 1.2, a: 1,
        col: '255,107,157', dec: 0.008 + s * 0.001, grav: 0.02, bloom: 12 });
    }
    // Axon terminal burst
    for (i = 0; i < 8; i++) {
      ang = Math.random() * Math.PI * 2; spd = 0.5 + Math.random() * 1.5;
      fwParts.push({
        x: cx + Math.cos(aa) * 35, y: cy + Math.sin(aa) * 35,
        vx: Math.cos(ang) * spd + Math.cos(aa) * 2,
        vy: Math.sin(ang) * spd + Math.sin(aa) * 2,
        r: 1.5 + Math.random(), a: 1,
        col: '255,107,157', dec: 0.015, grav: 0.025, bloom: 10 });
    }
    // Neurotransmitter sparkles — gold rain
    for (i = 0; i < 30; i++) {
      ang = Math.random() * Math.PI * 2; spd = 1 + Math.random() * 4.5;
      fwParts.push({
        x: cx, y: cy, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,

        col: '255,229,102', dec: 0.005 + Math.random() * 0.01,
        grav: 0.035 + Math.random() * 0.025, bloom: 6 });
    }
  }

  function captureNeuronImage(callback) {
    var sc = document.createElement('canvas');
    sc.width = CW; sc.height = CH;
    var sx = sc.getContext('2d');

    // Use live state if frozen not yet set
    var drawBranches = (frozenBranches && frozenBranches.length) ? frozenBranches : branches;
    var drawDots = (frozenDots && frozenDots.length) ? frozenDots : dots;

    // Background
    sx.fillStyle = '#000';
    sx.fillRect(0, 0, sc.width, sc.height);

    // HUD overlay
    sx.fillStyle = 'rgba(0,0,0,0.6)';
    sx.fillRect(0, 0, CW, 46);
    sx.fillStyle = '#4fc3f7';
    sx.font = '900 15px Courier New';
    sx.textBaseline = 'middle';
    sx.fillText('NEURON', 14, 23);
    sx.textAlign = 'right';
    sx.font = '700 14px Courier New';
    sx.fillText(score + ' SYNAPSES', CW - 14, 23);
    sx.textAlign = 'left';

    sx.save();

    // Grid
    sx.strokeStyle = 'rgba(79,195,247,0.05)'; sx.lineWidth = 0.5;
    var x, y;
    for (x = 0; x <= COLS; x++) { sx.beginPath(); sx.moveTo(x*CELL,0); sx.lineTo(x*CELL,CH); sx.stroke(); }
    for (y = 0; y <= ROWS; y++) { sx.beginPath(); sx.moveTo(0,y*CELL); sx.lineTo(CW,y*CELL); sx.stroke(); }

    // Axon
    if (axonPts.length > 0) {
      sx.save();
      sx.strokeStyle = 'rgba(255,107,157,0.7)'; sx.lineWidth = 2.5; sx.lineCap = 'round';
      sx.shadowColor = 'rgba(255,107,157,0.5)'; sx.shadowBlur = 6;
      sx.setLineDash([5,5]);
      sx.beginPath(); sx.moveTo(worldX(somaGX), worldY(somaGY));
      for (var ai = 0; ai < axonPts.length; ai++) sx.lineTo(worldX(axonPts[ai].x), worldY(axonPts[ai].y));
      sx.stroke(); sx.setLineDash([]); sx.restore();
    }

    // Branches
    for (var bi = 0; bi < drawBranches.length; bi++) {
      var fb = drawBranches[bi];
      if (fb.path.length < 2) continue;
      sx.save(); sx.lineWidth = isAct ? Math.max(CELL * 0.35, 3) : Math.max(CELL * 0.25, 2.5); sx.lineCap = 'round'; sx.lineJoin = 'round';
      var isAct = (bi === activeIdx);
      sx.strokeStyle = isAct ? 'rgba(79,195,247,0.95)' : 'rgba(30,120,200,0.6)';
      sx.shadowColor  = isAct ? 'rgba(79,195,247,0.7)'  : 'rgba(30,120,200,0.35)';
      sx.shadowBlur = isAct ? 10 : 5;
      sx.beginPath(); sx.moveTo(worldX(somaGX), worldY(somaGY));
      for (var pi = 0; pi < fb.path.length; pi++) sx.lineTo(worldX(fb.path[pi].x), worldY(fb.path[pi].y));
      sx.stroke(); sx.restore();
    }

    // Soma
    var smx = worldX(somaGX), smy = worldY(somaGY), r = CELL * 2.8;
    var sg = sx.createRadialGradient(smx,smy,0,smx,smy,r*1.8);
    sg.addColorStop(0,'rgba(79,195,247,0.18)'); sg.addColorStop(1,'rgba(79,195,247,0)');
    sx.beginPath(); sx.arc(smx,smy,r*1.8,0,Math.PI*2); sx.fillStyle=sg; sx.fill();
    sx.save(); sx.translate(smx,smy);
    sx.beginPath();
    sx.moveTo(0,-r*0.8);
    sx.bezierCurveTo(r*0.25,-r*0.35,r*0.7,r*0.2,r*0.7,r*0.6);
    sx.bezierCurveTo(r*0.4,r*0.72,-r*0.4,r*0.72,-r*0.7,r*0.6);
    sx.bezierCurveTo(-r*0.7,r*0.2,-r*0.25,-r*0.35,0,-r*0.8);
    sx.closePath();
    var fg2 = sx.createRadialGradient(0,-r*0.05,0,0,r*0.2,r*0.9);
    fg2.addColorStop(0,'rgba(140,220,255,1)'); fg2.addColorStop(0.4,'rgba(40,130,220,1)'); fg2.addColorStop(1,'rgba(4,20,70,1)');
    sx.fillStyle=fg2; sx.fill();
    sx.strokeStyle='rgba(160,220,255,1)'; sx.lineWidth=2; sx.stroke();
    sx.restore();

    // Dots
    for (var di = 0; di < drawDots.length; di++) {
      var dot = drawDots[di];
      sx.save(); sx.shadowColor='rgba(255,229,102,0.9)'; sx.shadowBlur=12;
      sx.beginPath(); sx.arc(worldX(dot.x),worldY(dot.y),6,0,Math.PI*2);
      sx.fillStyle='rgba(255,229,102,0.88)'; sx.fill(); sx.restore();
    }

    // Watermark
    sx.globalAlpha = 0.07;
    sx.fillStyle = '#ff4466';
    sx.font = '900 ' + Math.floor(CW / 5) + 'px Courier New';
    sx.textAlign = 'center';
    sx.fillText('APOPTOSIS', CW/2, CH/2 + 20);
    sx.globalAlpha = 1;

    sx.restore();

    // toBlob is async — must use callback pattern
    try {
      sc.toBlob(function(blob) {
        callback(blob);
      }, 'image/png');
    } catch(e) {
      callback(null);
    }
  }

  function doShare(platform) {
    var APP_URL = 'https://neuronsnake.com';

    var encodedText = encodeURIComponent(shareText);

  // Draw
  function drawFrame(ts) {
    ctx.clearRect(0, 0, CW, CH);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, CW, CH);

    // Background ambient dendrites (death burst only)
    if (gState === 'dead') {
      tickBgDendrites('dead');
      drawBgDendrites();
    }

    // Grid
    ctx.strokeStyle = 'rgba(79,195,247,0.04)';
    ctx.lineWidth = 0.5;
    var x, y;
    for (x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,CH); ctx.stroke(); }
    for (y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(CW,y*CELL); ctx.stroke(); }

    // Axon
    if (axonPts.length > 0) {
      ctx.save();
      ctx.strokeStyle = 'rgba(255,107,157,0.65)';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.shadowColor = 'rgba(255,107,157,0.5)';
      ctx.shadowBlur = 7;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(worldX(somaGX), worldY(somaGY));
      var ai;
      for (ai = 0; ai < axonPts.length; ai++) ctx.lineTo(worldX(axonPts[ai].x), worldY(axonPts[ai].y));
      ctx.stroke();
      ctx.setLineDash([]);
      var al = axonPts[axonPts.length - 1];
      ctx.beginPath(); ctx.arc(worldX(al.x), worldY(al.y), 5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,107,157,0.9)'; ctx.shadowBlur = 14; ctx.fill();
      ctx.restore();
    }

    // Cell zone fill — shows actual collision hitbox per grid cell
    var bi, b, pi, head, hx, hy;
    if (!isDemo) {
      for (bi = 0; bi < branches.length; bi++) {
        b = branches[bi];
        if (b.path.length < 1) continue;
        var isAct2 = (bi === activeIdx);
        ctx.fillStyle = isAct2 ? 'rgba(79,195,247,0.09)' : 'rgba(30,120,200,0.055)';
        for (pi = 0; pi < b.path.length; pi++) {
          ctx.fillRect(b.path[pi].x * CELL, b.path[pi].y * CELL, CELL, CELL);
        }
      }
    }

    // Branches — drawn before soma so they appear to grow from behind it
    for (bi = 0; bi < branches.length; bi++) {
      b = branches[bi];
      if (b.path.length < 2) continue;
      var isActive = (bi === activeIdx);
      ctx.save();
      var bw = isDemo
        ? (isActive ? Math.max(CELL * 0.15, 1.5) : Math.max(CELL * 0.1, 1))
        : (isActive ? Math.max(CELL * 0.2, 2.5) : Math.max(CELL * 0.15, 2));
      ctx.lineWidth = bw;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = isActive ? 'rgba(79,195,247,0.95)' : 'rgba(30,120,200,0.55)';
      ctx.shadowColor  = isActive ? 'rgba(79,195,247,0.7)'  : 'rgba(30,120,200,0.3)';
      ctx.shadowBlur   = isActive ? 12 : 4;
      ctx.beginPath();
      ctx.moveTo(worldX(somaGX), worldY(somaGY));
      for (pi = 0; pi < b.path.length; pi++) ctx.lineTo(worldX(b.path[pi].x), worldY(b.path[pi].y));
      ctx.stroke();
      if (isActive && b.growing) {
        head = b.path[b.path.length - 1];
        hx = worldX(head.x); hy = worldY(head.y);
        var hr = Math.max(CELL * 0.22, 4);
        ctx.beginPath(); ctx.arc(hx, hy, hr, 0, Math.PI*2);
        ctx.fillStyle = '#4fc3f7'; ctx.shadowBlur = 18; ctx.fill();
        var arrL = CELL * 0.4, arrW = CELL * 0.18;
        ctx.beginPath();
        ctx.moveTo(hx + b.dirX*arrL, hy + b.dirY*arrL);
        ctx.lineTo(hx + b.dirX*arrL - b.dirY*arrW, hy + b.dirY*arrL + b.dirX*arrW);
        ctx.lineTo(hx + b.dirX*arrL + b.dirY*arrW, hy + b.dirY*arrL - b.dirX*arrW);
        ctx.closePath();
        ctx.fillStyle = 'rgba(79,195,247,0.65)'; ctx.fill();
      }
      ctx.restore();
    }

    // Soma
    var smx = worldX(somaGX), smy = worldY(somaGY), r = CELL * 2.8;
    var sg = ctx.createRadialGradient(smx, smy, 0, smx, smy, r*1.8);
    sg.addColorStop(0, 'rgba(79,195,247,0.18)'); sg.addColorStop(1, 'rgba(79,195,247,0)');
    ctx.beginPath(); ctx.arc(smx, smy, r*1.8, 0, Math.PI*2); ctx.fillStyle = sg; ctx.fill();
    ctx.save(); ctx.translate(smx, smy);
    // Pyramidal cell shape: sharp apex at top, wide flat base, slightly bowed sides
    ctx.beginPath();
    ctx.moveTo(0, -r*0.8);
    ctx.bezierCurveTo( r*0.25, -r*0.35,  r*0.7,  r*0.2,  r*0.7,  r*0.6);
    ctx.bezierCurveTo( r*0.4,   r*0.72, -r*0.4,  r*0.72, -r*0.7,  r*0.6);
    ctx.bezierCurveTo(-r*0.7,   r*0.2,  -r*0.25, -r*0.35, 0,      -r*0.8);
    ctx.closePath();
    var fg = ctx.createRadialGradient(0, -r*0.05, 0, 0, r*0.2, r*0.9);
    fg.addColorStop(0,   'rgba(140,220,255,1)');
    fg.addColorStop(0.4, 'rgba(40,130,220,1)');
    fg.addColorStop(1,   'rgba(4,20,70,1)');
    ctx.fillStyle = fg; ctx.fill();
    ctx.strokeStyle = 'rgba(160,220,255,1)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.restore();

    // Origin dots
    var oi;
    for (oi = 0; oi < origins.length; oi++) {
      var inUse = false;
      for (bi = 0; bi < branches.length; bi++) if (branches[bi].origName === origins[oi].name) { inUse = true; break; }
      ctx.beginPath(); ctx.arc(worldX(origins[oi].x), worldY(origins[oi].y), 3, 0, Math.PI*2);
      ctx.fillStyle = inUse ? 'rgba(79,195,247,0.85)' : 'rgba(79,195,247,0.15)'; ctx.fill();
    }

    // Dots
    var t = ts / 1000;
    var di, dot, pulse, dr, dg;
    for (di = 0; di < dots.length; di++) {
      dot = dots[di];
      pulse = 0.75 + 0.25 * Math.sin(t * 3 + dot.phase);
      dr = 6 * pulse;
      dg = ctx.createRadialGradient(worldX(dot.x), worldY(dot.y), 0, worldX(dot.x), worldY(dot.y), dr*3.5);
      dg.addColorStop(0, 'rgba(255,229,102,' + (0.32*pulse) + ')');
      dg.addColorStop(1, 'rgba(255,229,102,0)');
      ctx.beginPath(); ctx.arc(worldX(dot.x), worldY(dot.y), dr*3.5, 0, Math.PI*2);
      ctx.fillStyle = dg; ctx.fill();
      ctx.save();
      ctx.shadowColor = 'rgba(255,229,102,0.9)'; ctx.shadowBlur = 13*pulse;
      ctx.beginPath(); ctx.arc(worldX(dot.x), worldY(dot.y), dr, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,229,102,' + (0.88*pulse) + ')'; ctx.fill();
      ctx.beginPath(); ctx.arc(worldX(dot.x) - dr*0.3, worldY(dot.y) - dr*0.3, dr*0.38, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,210,0.9)'; ctx.fill();
      ctx.restore();
    }

    // Signals
    var si, sig, path, n, pos, idx, frac, ax2, ay, bx2, by2, sx2, sy2, inAx;
    for (si = signals.length - 1; si >= 0; si--) {
      sig = signals[si];
      sig.t += sig.spd;
      if (sig.t >= 1) {
        if (sig.onDone) sig.onDone();
        signals.splice(si, 1);
        continue;
      }
      path = sig.path; n = path.length;
      pos = sig.t * (n - 1); idx = Math.floor(pos); frac = pos - idx;
      if (idx >= n - 1) continue;
      ax2 = worldX(path[idx].x); ay = worldY(path[idx].y);
      bx2 = worldX(path[idx+1].x); by2 = worldY(path[idx+1].y);
      sx2 = ax2 + (bx2-ax2)*frac; sy2 = ay + (by2-ay)*frac;
      inAx = (idx >= n - axonPts.length - 1);
      ctx.save();
      ctx.shadowColor = inAx ? 'rgba(255,107,157,0.9)' : 'rgba(79,195,247,0.9)';
      ctx.shadowBlur = 16;
      ctx.beginPath(); ctx.arc(sx2, sy2, 5, 0, Math.PI*2);
      ctx.fillStyle = inAx ? '#ff9dcc' : '#a8e6ff'; ctx.fill();
      ctx.beginPath(); ctx.arc(sx2, sy2, 2, 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.restore();
    }

    // Particles
    if (particlesActive) {
      tickParticles();
      var pi2, p;
      for (pi2 = 0; pi2 < particles.length; pi2++) {
        p = particles[pi2];
        if (p.a <= 0) continue;
        ctx.save();
        ctx.shadowColor = 'rgba(' + p.col + ',0.8)'; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.4, p.r * p.a), 0, Math.PI*2);
        ctx.fillStyle = 'rgba(' + p.col + ',' + Math.min(1, p.a) + ')'; ctx.fill();
        ctx.restore();
      }
    }
  }

  function refreshHUD() {
    valScore.textContent = score;
    var c = 0, i;
    for (i = 0; i < branches.length; i++) if (branches[i].path.length > 2) c++;
    valBranch.textContent = c;
    var hearts = '';
    if (lives > 5) {
      hearts = '\u2764\uFE0F\u00D7' + lives;
    } else {
      var maxH = Math.max(lives, 2);
      for (i = 0; i < lives; i++) hearts += '\u2764\uFE0F';
      for (i = lives; i < maxH; i++) hearts += '\uD83D\uDC94';
    }
    valLives.textContent = hearts;
  }

  function flashScore() {
    valScore.style.color = '#ffe566';
    valScore.style.transform = 'scale(1.5)';
    setTimeout(function() { valScore.style.color = '#4fc3f7'; valScore.style.transform = 'scale(1)'; }, 300);
  }

  // Loop
  function loop(ts) {
    try {
      if (!lastTS) lastTS = ts;
      var dt = ts - lastTS; if (dt > 100) dt = 100;
      lastTS = ts;
      drawFrame(ts);
      if (gState === 'menu' && isDemo) {
        if (score >= 8) demoInit();
        demoAccum += dt;
        while (demoAccum >= gameSpd) { demoAccum -= gameSpd; demoAI(); step(); }
      }
      if (gState === 'playing' && !isDead) {
        accum += dt;
        while (accum >= gameSpd) { accum -= gameSpd; step(); }
      }
    } catch(e) {
      var box = document.getElementById('errBox');
      if (box) { box.style.display='block'; box.textContent='LOOP ERR: '+e.message; }
    }
    requestAnimationFrame(loop);
  }

  // Check if returning from Stripe payment
  if (!checkStripeReturn()) {
    demoInit();
  }
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
