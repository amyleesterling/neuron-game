<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THE HIVE MIND — NEURON</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="brain.css">
</head>
<body>

<div id="topBar">
  <span class="title">THE HIVE MIND</span>
  <div class="navLinks">
    <a class="backBtn" href="/">PLAY</a>
    <a class="backBtn" href="/gallery.html">GALLERY</a>
    <a class="backBtn" href="/leaderboard.html">LEADERBOARD</a>
    <button class="backBtn" id="learnBtn" onclick="window._learnCards.open()">LEARN</button>
    <button id="legendBtn" onclick="document.getElementById('legendPanel').classList.toggle('open')" title="Neural populations">?</button>
  </div>
</div>
<div id="statsBar">
  <span class="hiveStat"><span class="hsNum" id="neuronCount">--</span>NEURONS</span>
  <span class="hiveStat"><span class="hsNum" id="synapseCount">--</span>SYNAPSES</span>
  <span class="hiveStat"><span class="hsNum" id="popCount">--</span>POPULATIONS</span>
</div>
<div id="animalBadge">
  <span class="badgeIcon" id="badgeIcon">🧠</span>
  <span class="badgeText" id="badgeText">LOADING...</span>
</div>
<div id="progressWrap" style="display:none;">
  <span class="progLabel" id="progLabel"></span>
  <div id="progressBar"><div class="progFill" id="progFill"></div></div>
</div>

<canvas id="bgCanvas"></canvas>
<canvas id="fxCanvas"></canvas>

<div id="tooltip">
  <div><span class="ttFlag" id="ttFlag"></span><span class="ttName" id="ttName"></span></div>
  <div class="ttScore" id="ttScore"></div>
  <div class="ttPop" id="ttPop"></div>
  <div class="ttDate" id="ttDate"></div>
</div>

<div id="legendPanel">
  <div class="legTitle">NEURAL POPULATIONS</div>
  <div id="legendItems"></div>
</div>

<div id="learnOverlay">
  <div id="learnBg" onclick="window._learnCards.close()"></div>
  <div id="learnCard">
    <div id="learnCardInner">
      <div class="lc-header">
        <span class="lc-counter" id="lcCounter">1 / 7</span>
        <button class="lc-close" onclick="window._learnCards.close()">&times;</button>
      </div>
      <div class="lc-canvas-wrap">
        <div class="lc-canvas-slider" id="lcCanvasSlider"></div>
      </div>
      <div class="lc-content-slider" id="lcContentSlider"></div>
      <div class="lc-nav">
        <button class="lc-arrow" id="lcPrev" onclick="window._learnCards.prev()">&#9664;</button>
        <div class="lc-dots" id="lcDots"></div>
        <button class="lc-arrow" id="lcNext" onclick="window._learnCards.next()">&#9654;</button>
      </div>
    </div>
  </div>
</div>

<div id="loading"><span class="loadText">CONNECTING TO HIVE MIND...</span></div>

<script src="brain-icons.js"></script>
<script src="brain-data.js"></script>
<script src="brain-network.js"></script>
<script src="brain-render.js"></script>
<script src="brain-learn.js"></script>
<script src="brain-main.js"></script>
</body>
</html>
